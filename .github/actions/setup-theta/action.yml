name: "setup-theta"
description: >-
  Download a release tarball/zip of the theta binary from
  github.com/tamarillo-ai/theta, verify its sha256, and extract it into
  src/theta_py/_bin/. The binary will be ready for either codegen or
  wheel build.

inputs:
  theta_version:
    description: "theta release version (without leading v, e.g. 0.1.3-rc1)"
    required: true
  target:
    description: >-
      Rust target triple matching theta's release assets, e.g.
      x86_64-unknown-linux-gnu. Defaults to the auto-detected host triple
      for the runner. Override when cross-building wheels (for example
      x86_64-apple-darwin from an aarch64 macOS runner).
    required: false
    default: ""

outputs:
  binary_path:
    description: "absolute path to the extracted binary"
    value: ${{ steps.extract.outputs.binary_path }}
  target:
    description: "the rust target triple that was actually downloaded"
    value: ${{ steps.resolve.outputs.target }}

runs:
  using: "composite"
  steps:
    - id: resolve
      shell: bash
      run: |
        set -euo pipefail

        if [[ -n "${{ inputs.target }}" ]]; then
          triple="${{ inputs.target }}"
        else
          os="$(uname -s)"
          arch="$(uname -m)"
          case "$os/$arch" in
            Linux/x86_64)              triple="x86_64-unknown-linux-gnu" ;;
            Linux/aarch64|Linux/arm64) triple="aarch64-unknown-linux-gnu" ;;
            Darwin/x86_64)             triple="x86_64-apple-darwin" ;;
            Darwin/arm64)              triple="aarch64-apple-darwin" ;;
            # Git Bash on Windows runners reports MINGW64_NT-*; the only
            # windows wheel we ship is x86_64-pc-windows-msvc.
            MINGW64_NT*|MSYS_NT*)      triple="x86_64-pc-windows-msvc" ;;
            *)
              echo "::error::unsupported host: $os/$arch" >&2
              exit 1
              ;;
          esac
        fi

        case "$triple" in
          *windows*) ext="zip" ;;
          *)         ext="tar.gz" ;;
        esac

        echo "target=$triple" >> "$GITHUB_OUTPUT"
        echo "ext=$ext" >> "$GITHUB_OUTPUT"
        echo "resolved target: $triple (.$ext)"

    - id: extract
      shell: bash
      run: |
        set -euo pipefail

        target="${{ steps.resolve.outputs.target }}"
        ext="${{ steps.resolve.outputs.ext }}"
        version="${{ inputs.theta_version }}"
        base="https://github.com/tamarillo-ai/theta/releases/download/v${version}"
        asset="theta-${target}.${ext}"

        mkdir -p src/theta_py/_bin
        curl --fail --silent --show-error --location \
          -o "$RUNNER_TEMP/${asset}" "${base}/${asset}"
        curl --fail --silent --show-error --location \
          -o "$RUNNER_TEMP/${asset}.sha256" "${base}/${asset}.sha256"

        # sha256 verification — sha256sum on linux, shasum on darwin,
        # both available on windows via Git Bash.
        pushd "$RUNNER_TEMP" >/dev/null
        if command -v sha256sum >/dev/null 2>&1; then
          sha256sum --check "${asset}.sha256"
        else
          shasum -a 256 --check "${asset}.sha256"
        fi
        popd >/dev/null

        if [[ "$ext" == "zip" ]]; then
          unzip -o "$RUNNER_TEMP/${asset}" -d src/theta_py/_bin
          binary="src/theta_py/_bin/theta.exe"
        else
          tar -xzf "$RUNNER_TEMP/${asset}" -C src/theta_py/_bin
          binary="src/theta_py/_bin/theta"
          chmod +x "$binary"
        fi

        echo "binary_path=${binary}" >> "$GITHUB_OUTPUT"

        # Sanity-check IF the binary is runnable on the runner (cross builds
        # will not be). Linux/macOS runners only get matched binaries via
        # the auto-detect path above, so this is safe by construction.
        if [[ "$target" != *windows* ]]; then
          host_arch="$(uname -m)"
          case "$target" in
            x86_64-*)    expected_arch="x86_64" ;;
            aarch64-*)   expected_arch="aarch64" ;;
          esac
          if [[ "$host_arch" == "$expected_arch" ]] || \
             ( [[ "$host_arch" == "arm64"  ]] && [[ "$expected_arch" == "aarch64" ]] ); then
            "$binary" --version
          else
            echo "skipping --version check (cross-build: host=$host_arch, target=$target)"
          fi
        else
          # Windows runners use Git Bash; .exe works fine.
          "$binary" --version
        fi
