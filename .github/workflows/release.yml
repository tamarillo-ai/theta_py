name: release

# Fires only on tag push (v*). Builds 5 platform wheels in parallel, then
# publishes:
#   - to TestPyPI for any tag (rc or final);
#   - to PyPI only for final tags (no `-rc`, no `-alpha`, no `-beta`).
# Tag examples:
#   v0.0.6        → TestPyPI + PyPI
#   v0.0.6-rc1    → TestPyPI only
# This workflow does NOT modify source. It assumes the committed _generated/
# tree + _version.py match what the wheel will ship — `ci.yml`'s drift
# detector has already validated that on every PR.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build wheels but skip publishing"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  read-pin:
    name: "read pinned theta version"
    runs-on: ubuntu-latest
    outputs:
      theta_version: ${{ steps.theta.outputs.version }}
      is_prerelease: ${{ steps.classify.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.13"
      - run: uv sync
      - id: theta
        shell: bash
        run: |
          set -euo pipefail
          version=$(uv run python -c "from theta_py._version import THETA_VERSION; print(THETA_VERSION)")
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - id: classify
        shell: bash
        run: |
          # A tag like v0.0.6-rc1, v0.0.6a1, v0.0.6b1 is a pre-release.
          ref="${GITHUB_REF_NAME}"
          if [[ "$ref" =~ -(rc|a|b|alpha|beta) ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: "build (${{ matrix.target }})"
    needs: read-pin
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.13"

      - run: uv sync

      - name: "setup theta binary (${{ matrix.target }})"
        id: theta_bin
        uses: ./.github/actions/setup-theta
        with:
          theta_version: ${{ needs.read-pin.outputs.theta_version }}
          target: ${{ matrix.target }}

      - name: "build wheel"
        shell: bash
        env:
          THETA_PY_REQUIRE_BINARY: "1"
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          THETA_PY_PLATFORM_TAG: ${{ matrix.target == 'x86_64-apple-darwin' && 'macosx_11_0_x86_64' || '' }}
        run: uv build --wheel

      - name: "verify wheel layout"
        shell: bash
        run: |
          set -euo pipefail
          wheel="$(ls dist/*.whl | head -n 1)"
          uv run python - <<PY
          import sys, zipfile
          wheel = "$wheel"
          with zipfile.ZipFile(wheel) as z:
              names = z.namelist()
          script_entries = [n for n in names if ".data/scripts/theta" in n]
          if not script_entries:
              print("FAIL: no scripts/theta entry", file=sys.stderr); sys.exit(1)
          if any("theta_py/_bin/" in n for n in names):
              print("FAIL: stray theta_py/_bin/", file=sys.stderr); sys.exit(1)
          if "py3-none-any" in wheel:
              print("FAIL: wheel tagged py3-none-any", file=sys.stderr); sys.exit(1)
          print("OK")
          PY

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  collect:
    name: "collect wheels"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist
      - shell: bash
        run: |
          set -euo pipefail
          echo "all built wheels:"
          ls -la dist
          # Should be exactly 5 wheels.
          count=$(ls dist/*.whl | wc -l | tr -d ' ')
          if [[ "$count" != "5" ]]; then
            echo "::error::expected 5 wheels, got $count" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-all
          path: dist/*.whl

  publish-testpypi:
    name: "publish to TestPyPI"
    needs: [read-pin, collect]
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: testpypi
      url: https://test.pypi.org/project/theta-py
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wheels-all
          path: dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: "publish to PyPI"
    needs: [read-pin, collect, publish-testpypi]
    if: >-
      ${{ github.event_name == 'push'
          && needs.read-pin.outputs.is_prerelease == 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: pypi
      url: https://pypi.org/project/theta-py
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wheels-all
          path: dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
