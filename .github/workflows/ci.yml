name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  lint:
    name: "lint (ruff + ty)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.13"
      - run: uv sync
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests
      - run: uv run ty check src

  test:
    name: "test (py${{ matrix.python }} on ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-15, windows-2025]
        python: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}

      - run: uv sync

      - name: "read pinned theta version"
        id: theta
        shell: bash
        run: |
          set -euo pipefail
          version=$(uv run python -c "from theta_py._version import THETA_VERSION; print(THETA_VERSION)")
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "pinned theta version: ${version}"

      - name: "setup theta binary"
        id: theta_bin
        uses: ./.github/actions/setup-theta
        with:
          theta_version: ${{ steps.theta.outputs.version }}

      - name: "pytest (no network)"
        shell: bash
        env:
          THETA_BIN: ${{ github.workspace }}/${{ steps.theta_bin.outputs.binary_path }}
        run: uv run pytest -q -m "not network"

  drift-detector:
    name: "drift detector (codegen stays in sync with pinned theta)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.13"

      - run: uv sync

      - name: "read pinned theta version"
        id: theta
        shell: bash
        run: |
          set -euo pipefail
          version=$(uv run python -c "from theta_py._version import THETA_VERSION; print(THETA_VERSION)")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: "setup theta binary (linux x86_64)"
        id: theta_bin
        uses: ./.github/actions/setup-theta
        with:
          theta_version: ${{ steps.theta.outputs.version }}
          target: x86_64-unknown-linux-gnu

      - name: "regenerate codegen"
        run: |
          uv run python -m theta_py._codegen \
            --binary ${{ steps.theta_bin.outputs.binary_path }} \
            --theta-version ${{ steps.theta.outputs.version }}

      - name: "assert committed tree matches regenerated tree"
        shell: bash
        run: |
          set -euo pipefail
          # _bin/ is gitignored, so regeneration's only effects are the
          # generated source files.  If `git diff` shows ANY change, the
          # committed tree drifted from what codegen produces against the
          # pinned theta binary.
          if ! git diff --exit-code -- \
                src/theta_py/_generated \
                src/theta_py/_version.py \
                tests/_generated; then
            echo "::error::Committed codegen does not match what" \
                 "\`python -m theta_py._codegen\` produces. Regenerate" \
                 "locally and commit the diff." >&2
            exit 1
          fi
          echo "OK: committed codegen matches pinned theta version" \
               "${{ steps.theta.outputs.version }}"

  wheel-smoke:
    name: "wheel build smoke (${{ matrix.target }})"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      # Mirror theta's release matrix 1:1 — same OSes, same target triples.
      # If theta's release.yml changes shape, this matrix must change too.
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-apple-darwin
            os: macos-15
          - target: x86_64-pc-windows-msvc
            os: windows-2025
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.13"

      - run: uv sync

      - name: "read pinned theta version"
        id: theta
        shell: bash
        run: |
          version=$(uv run python -c "from theta_py._version import THETA_VERSION; print(THETA_VERSION)")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: "setup theta binary"
        id: theta_bin
        uses: ./.github/actions/setup-theta
        with:
          theta_version: ${{ steps.theta.outputs.version }}
          target: ${{ matrix.target }}

      - name: "build wheel"
        shell: bash
        env:
          THETA_PY_REQUIRE_BINARY: "1"
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          THETA_PY_PLATFORM_TAG: ${{ matrix.target == 'x86_64-apple-darwin' && 'macosx_11_0_x86_64' || '' }}
        run: uv build --wheel

      - name: "verify wheel layout"
        shell: bash
        run: |
          set -euo pipefail
          wheel="$(ls dist/*.whl | head -n 1)"
          echo "wheel: $wheel"
          uv run python - <<PY
          import sys, zipfile
          wheel = "$wheel"
          with zipfile.ZipFile(wheel) as z:
              names = z.namelist()
          if not any(".data/scripts/theta" in n for n in names):
              print("FAIL: no .data/scripts/theta in wheel", file=sys.stderr); sys.exit(1)
          if any("theta_py/_bin/" in n for n in names):
              print("FAIL: wheel has stray theta_py/_bin/", file=sys.stderr); sys.exit(1)
          if "py3-none-any" in wheel:
              print("FAIL: wheel tagged py3-none-any", file=sys.stderr); sys.exit(1)
          print("wheel layout + tag OK")
          PY

      - name: "throwaway-venv smoke test (native targets only)"
        if: matrix.target != 'x86_64-apple-darwin'
        shell: bash
        run: |
          set -euo pipefail
          wheel="$(ls dist/*.whl | head -n 1)"
          venv="${RUNNER_TEMP}/throwaway"
          uv venv --python 3.13 "$venv"
          uv pip install --python "$venv" --quiet "$wheel"
          unset THETA_BIN
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            py="$venv/Scripts/python.exe"
          else
            py="$venv/bin/python"
          fi
          "$py" - <<'PY'
          import os, sysconfig, tempfile
          from pathlib import Path
          scripts = Path(sysconfig.get_path("scripts"))
          expected = scripts / ("theta.exe" if os.name == "nt" else "theta")
          assert expected.exists(), f"missing {expected}"
          from theta_py.runner import _resolve_binary
          resolved = _resolve_binary(auto_install=False)
          assert resolved == expected, f"resolved {resolved} != {expected}"
          os.chdir(tempfile.mkdtemp())
          from theta_py import theta
          out = theta.init(name="ci-smoke")
          assert out.agent_name == "ci-smoke"
          print(f"OK — binary at {resolved}")
          PY
